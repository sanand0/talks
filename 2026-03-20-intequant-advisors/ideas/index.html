<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InteQuant Advisors · AI Ideas Table</title>
  <meta name="description" content="A sortable table of AI workflow ideas tailored to InteQuant Advisors, grounded in company research, transcripts, blog posts, talks, and TILs." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1426'/%3E%3Ctext x='32' y='38' text-anchor='middle' font-size='30'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --ink: #f4efe2;
      --muted: #b8b0a2;
      --dim: rgba(244, 239, 226, 0.42);
      --line: rgba(255, 244, 212, 0.12);
      --surface: rgba(16, 22, 39, 0.96);
      --surface-soft: rgba(255, 255, 255, 0.04);
      --row-hover: rgba(255, 255, 255, 0.045);
      --row-border: rgba(255, 244, 212, 0.055);
      --th-bg: rgba(255, 255, 255, 0.04);
      --bar-track: rgba(255, 255, 255, 0.09);
      --badge-bg: rgba(255, 255, 255, 0.06);
      --badge-border: rgba(255, 255, 255, 0.11);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
      --dialog-bg: rgba(9, 14, 26, 0.98);
      --detail-bg: rgba(255, 255, 255, 0.038);
      --detail-border: rgba(255, 255, 255, 0.07);
      --search-bg: rgba(255, 255, 255, 0.055);
      --gold: #f2c879;
      --rose: #f59e8b;
      --azure: #7eb6ff;
      --violet: #b79dff;
      --mint: #7de2d1;
      --danger: #f08b78;
      --font-d: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --font-ui: "Avenir Next", "Gill Sans", "Trebuchet MS", "Segoe UI", sans-serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    }

    [data-theme="light"] {
      --ink: #1c1810;
      --muted: #7a7060;
      --dim: rgba(28, 24, 16, 0.38);
      --line: rgba(28, 24, 16, 0.13);
      --surface: rgba(255, 252, 244, 0.98);
      --surface-soft: rgba(0, 0, 0, 0.035);
      --row-hover: rgba(0, 0, 0, 0.028);
      --row-border: rgba(28, 24, 16, 0.07);
      --th-bg: rgba(0, 0, 0, 0.035);
      --bar-track: rgba(0, 0, 0, 0.1);
      --badge-bg: rgba(0, 0, 0, 0.055);
      --badge-border: rgba(0, 0, 0, 0.12);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      --dialog-bg: rgba(255, 252, 244, 0.99);
      --detail-bg: rgba(0, 0, 0, 0.032);
      --detail-border: rgba(0, 0, 0, 0.08);
      --search-bg: rgba(0, 0, 0, 0.055);
      --gold: #9a6c00;
      --rose: #c05038;
      --azure: #2060b8;
      --violet: #5830a0;
      --mint: #0b8f7a;
      --danger: #b94b38;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 1rem;
      color: var(--ink);
      overflow-x: hidden;
      transition: color 250ms ease;
    }

    [data-theme="dark"] body {
      background:
        radial-gradient(circle at 15% 20%, rgba(114,225,209,0.14), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(242,200,121,0.10), transparent 28%),
        linear-gradient(180deg, #0a0e18 0%, #0d1426 55%, #10192c 100%);
    }

    [data-theme="light"] body {
      background:
        radial-gradient(circle at 15% 20%, rgba(114,225,209,0.07), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(242,200,121,0.06), transparent 28%),
        linear-gradient(180deg, #f7f4ed 0%, #f2ede2 55%, #ede8da 100%);
    }

    a { color: inherit; }
    button { font: inherit; color: inherit; cursor: pointer; border: none; }

    .shell {
      width: min(1320px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .page-header {
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-title {
      font-family: var(--font-d);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
      letter-spacing: -0.03em;
      margin: 0;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 6px 0 0;
      max-width: 78ch;
      line-height: 1.45;
    }

    .header-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .search-input {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--search-bg);
      color: var(--ink);
      font: inherit;
      font-size: 0.92rem;
      padding: 7px 14px;
      outline: none;
      width: 210px;
      transition: border-color 150ms ease, width 200ms ease, box-shadow 150ms ease;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus {
      border-color: rgba(126, 182, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(126, 182, 255, 0.1);
      width: 270px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--badge-bg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 150ms ease;
    }
    .icon-btn:hover { background: var(--row-hover); }

    .header-link {
      font-size: 0.88rem;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid color-mix(in srgb, var(--gold) 35%, transparent);
      border-radius: 999px;
      padding: 7px 13px;
      background: color-mix(in srgb, var(--gold) 8%, transparent);
      transition: background 150ms ease;
      white-space: nowrap;
    }
    .header-link:hover { background: color-mix(in srgb, var(--gold) 15%, transparent); }

    .brief-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(280px, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-inner { padding: 16px 18px; }

    .panel-kicker {
      margin: 0 0 7px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--gold);
      font-weight: 700;
    }

    .brief-title {
      margin: 0 0 8px;
      font-family: var(--font-d);
      font-size: 1.2rem;
      letter-spacing: -0.02em;
    }

    .brief-text {
      margin: 0;
      color: color-mix(in srgb, var(--ink) 88%, var(--muted));
      line-height: 1.68;
      font-size: 0.95rem;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat-card {
      border: 1px solid var(--detail-border);
      border-radius: 14px;
      background: var(--surface-soft);
      padding: 12px;
      min-height: 94px;
    }

    .stat-label {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: var(--font-d);
      font-size: 1.45rem;
      line-height: 1;
      margin-bottom: 5px;
      letter-spacing: -0.02em;
    }

    .stat-note {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .challenge-list {
      display: grid;
      gap: 10px;
    }

    .challenge-card {
      border: 1px solid var(--detail-border);
      border-radius: 14px;
      background: var(--surface-soft);
      padding: 12px 13px;
      transition: border-color 130ms ease, background 130ms ease;
    }
    .challenge-card:hover {
      background: var(--row-hover);
      border-color: color-mix(in srgb, var(--azure) 35%, var(--detail-border));
    }

    .challenge-card button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      padding: 0;
      color: inherit;
    }

    .challenge-title {
      font-size: 0.93rem;
      font-weight: 700;
      margin-bottom: 5px;
      color: var(--ink);
      line-height: 1.35;
    }

    .challenge-body {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .toolbar-title {
      margin: 0;
      font-family: var(--font-d);
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .toolbar-subtitle {
      margin: 4px 0 0;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.77rem;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: var(--muted);
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      text-decoration: none;
      white-space: nowrap;
    }
    .chip:hover { background: var(--row-hover); color: var(--ink); }
    .chip.is-active {
      color: var(--ink);
      background: color-mix(in srgb, var(--gold) 12%, transparent);
      border-color: color-mix(in srgb, var(--gold) 35%, var(--badge-border));
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      width: 100%;
      overflow-x: auto;
    }

    table { border-collapse: collapse; width: 100%; min-width: 860px; }
    thead tr { background: var(--th-bg); border-bottom: 1px solid var(--line); }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
      user-select: none;
    }

    th.sortable { cursor: pointer; transition: color 140ms ease; }
    th.sortable:hover { color: var(--ink); }
    th.sort-asc::after  { content: " \2191"; color: var(--gold); }
    th.sort-desc::after { content: " \2193"; color: var(--gold); }

    tbody tr {
      border-bottom: 1px solid var(--row-border);
      cursor: pointer;
      transition: background 100ms ease;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody tr.is-active { background: color-mix(in srgb, var(--gold) 8%, transparent); }

    td { padding: 11px 16px; vertical-align: middle; line-height: 1.4; }

    td.col-title { min-width: 280px; max-width: 520px; }
    .title-text { font-family: var(--font-d); font-size: 1rem; letter-spacing: -0.01em; display: block; }
    .title-sub { display: block; font-size: 0.76rem; color: var(--muted); margin-top: 2px; }

    .lens-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.76rem;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      color: var(--muted);
      white-space: nowrap;
    }

    .source-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .score-wrap { display: flex; align-items: center; gap: 8px; min-width: 126px; }
    .score-num { font-family: var(--font-d); font-size: 1rem; min-width: 2.4ch; text-align: right; }
    .score-bar-bg {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: var(--bar-track);
      overflow: hidden;
      min-width: 60px;
    }
    .score-bar { height: 100%; border-radius: 999px; }
    .score-bar.importance { background: linear-gradient(90deg, var(--gold), var(--rose)); }
    .score-bar.novelty { background: linear-gradient(90deg, var(--violet), var(--azure)); }

    .empty-state { padding: 28px; text-align: center; color: var(--muted); font-size: 0.95rem; }

    dialog {
      width: min(920px, calc(100vw - 16px));
      max-height: calc(100dvh - 16px);
      margin: 8px auto;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      color: var(--ink);
      background: var(--dialog-bg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    dialog::backdrop { background: rgba(4, 8, 16, 0.72); backdrop-filter: blur(8px); }
    .dialog-shell { overflow-y: auto; max-height: calc(100dvh - 16px); }
    .dialog-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      position: sticky;
      top: 0;
      background: var(--dialog-bg);
      z-index: 2;
      border-bottom: 1px solid var(--detail-border);
    }

    .nav-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--detail-bg);
      font-size: 0.82rem;
      padding: 4px 11px;
      transition: background 140ms ease;
    }
    .nav-btn:hover:not(:disabled) { background: var(--row-hover); }
    .nav-btn:disabled { opacity: 0.32; cursor: not-allowed; }
    .nav-counter { font-size: 0.82rem; color: var(--muted); flex: 1; text-align: center; }

    .dialog-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--detail-bg);
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dialog-body { padding: 16px 20px 22px; }

    .dialog-overline {
      margin: 0 0 5px;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold);
      font-weight: 700;
    }

    .dialog-title {
      margin: 0 0 6px;
      font-family: var(--font-d);
      font-size: clamp(1.45rem, 3vw, 2.1rem);
      line-height: 1.06;
      letter-spacing: -0.025em;
    }

    .dialog-scores {
      display: flex;
      gap: 20px;
      margin: 10px 0 14px;
      flex-wrap: wrap;
    }

    .score-line { display: flex; align-items: center; gap: 7px; font-size: 0.86rem; color: var(--muted); }
    .score-line strong { font-family: var(--font-d); font-size: 1.1rem; color: var(--ink); }
    .score-line .mini-bar-bg { width: 64px; height: 5px; border-radius: 999px; background: var(--bar-track); overflow: hidden; }
    .score-line .mini-bar { height: 100%; border-radius: 999px; }
    .score-line .mini-bar.importance { background: linear-gradient(90deg, var(--gold), var(--rose)); }
    .score-line .mini-bar.novelty { background: linear-gradient(90deg, var(--violet), var(--azure)); }
    .score-line .score-note { font-size: 0.74rem; color: var(--muted); }

    .dialog-summary {
      margin: 0 0 10px;
      line-height: 1.68;
      font-size: 0.95rem;
      color: color-mix(in srgb, var(--ink) 85%, var(--muted));
    }

    .detail-block {
      margin: 0 0 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--detail-bg);
      border: 1px solid var(--detail-border);
      font-size: 0.88rem;
      line-height: 1.62;
      color: var(--muted);
    }
    .detail-block strong { color: var(--ink); }

    .explore-section { border-top: 1px solid var(--detail-border); padding-top: 14px; margin-top: 14px; }
    .explore-section h3 { margin: 0 0 9px; font-family: var(--font-d); font-size: 1rem; letter-spacing: -0.01em; }
    .explore-links { display: flex; flex-direction: column; gap: 2px; }

    .explore-link {
      display: flex;
      align-items: baseline;
      gap: 8px;
      text-decoration: none;
      font-size: 0.88rem;
      color: var(--ink);
      padding: 5px 7px;
      border-radius: 7px;
      transition: background 100ms ease;
    }
    .explore-link:hover { background: var(--row-hover); }
    .explore-link .link-label { flex: 1; }
    .explore-link .link-kind {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .source-file-note {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--detail-border);
      font-size: 0.79rem;
      color: var(--muted);
      line-height: 1.6;
      font-family: var(--font-mono);
      opacity: 0.72;
    }

    .tiny-note {
      margin-top: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .brief-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .shell { width: calc(100vw - 22px); padding: 16px 0 56px; }
      .page-header { align-items: flex-start; }
      .mini-stats { grid-template-columns: 1fr; }
      table { min-width: 720px; }
      th, td { padding: 9px 11px; }
      .search-input { width: 160px; }
      .search-input:focus { width: 190px; }
      .score-wrap { min-width: 86px; }
      .score-bar-bg { min-width: 36px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="page-header">
      <div>
        <h1 class="page-title">InteQuant AI Ideas Table</h1>
        <p class="page-subtitle" id="page-subtitle">Loading company brief…</p>
      </div>
      <div class="header-controls">
        <input class="search-input" id="search-input" type="search" placeholder="Search ideas…" autocomplete="off" />
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">☀️</button>
        <a class="header-link" href="../ideas.json">JSON</a>
        <a class="header-link" href="https://www.intequant.com/" target="_blank" rel="noreferrer">InteQuant ↗</a>
      </div>
    </header>

    <section class="brief-grid" id="brief-grid" hidden>
      <article class="panel">
        <div class="panel-inner">
          <p class="panel-kicker">Company Brief</p>
          <h2 class="brief-title" id="company-name">Loading…</h2>
          <p class="brief-text" id="company-summary"></p>
          <div class="mini-stats" id="mini-stats"></div>
        </div>
      </article>
      <aside class="panel">
        <div class="panel-inner">
          <p class="panel-kicker">Current Challenges</p>
          <div class="challenge-list" id="challenge-list"></div>
          <p class="tiny-note">Click a challenge to search for the ideas most relevant to that pain point.</p>
        </div>
      </aside>
    </section>

    <section>
      <div class="toolbar">
        <div>
          <h2 class="toolbar-title">Ranked Ideas</h2>
          <p class="toolbar-subtitle" id="result-count">Loading…</p>
        </div>
        <div class="filter-row" id="category-filters"></div>
      </div>

      <div class="table-wrap">
        <table id="ideas-table">
          <thead>
            <tr>
              <th class="sortable sort-desc" data-col="importance">Importance</th>
              <th class="sortable" data-col="novelty">Novelty</th>
              <th class="sortable" data-col="category">Category</th>
              <th class="sortable" data-col="title">Idea</th>
              <th class="sortable" data-col="source_count">Sources</th>
            </tr>
          </thead>
          <tbody id="ideas-tbody">
            <tr><td colspan="5" class="empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <dialog id="idea-dialog" aria-modal="true">
    <div class="dialog-shell">
      <div class="dialog-nav">
        <button class="nav-btn" id="prev-btn" aria-label="Previous idea">← Prev</button>
        <span class="nav-counter" id="nav-counter"></span>
        <button class="nav-btn" id="next-btn" aria-label="Next idea">Next →</button>
        <button class="dialog-close" id="dialog-close" aria-label="Close">✕</button>
      </div>
      <div class="dialog-body" id="dialog-body"></div>
    </div>
  </dialog>

  <script>
    const $ = (sel, el = document) => el.querySelector(sel);
    const $$ = (sel, el = document) => [...el.querySelectorAll(sel)];

    const html = document.documentElement;
    const themeBtn = $('#theme-toggle');
    const applyTheme = () => { themeBtn.textContent = html.dataset.theme === 'dark' ? '☀️' : '🌙'; };
    const savedTheme = localStorage.getItem('intequant-ideas-theme');
    if (savedTheme) {
      html.dataset.theme = savedTheme;
    } else {
      html.dataset.theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    applyTheme();
    themeBtn.addEventListener('click', () => {
      html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('intequant-ideas-theme', html.dataset.theme);
      applyTheme();
    });

    const tbody = $('#ideas-tbody');
    const resultCount = $('#result-count');
    const pageSubtitle = $('#page-subtitle');
    const searchInput = $('#search-input');
    const categoryFilters = $('#category-filters');
    const briefGrid = $('#brief-grid');
    const companyName = $('#company-name');
    const companySummary = $('#company-summary');
    const miniStats = $('#mini-stats');
    const challengeList = $('#challenge-list');
    const ideaDialog = $('#idea-dialog');
    const dialogBody = $('#dialog-body');
    const navCounter = $('#nav-counter');
    const prevBtn = $('#prev-btn');
    const nextBtn = $('#next-btn');

    let data;
    let allIdeas = [];
    let displayedIdeas = [];
    let sortCol = 'importance';
    let sortDir = -1;
    let searchQuery = '';
    let categoryFilter = 'all';
    let currentIdx = -1;
    let impMin = 0, impMax = 100, novMin = 0, novMax = 100;

    const slugify = (text) => text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    const categoryToId = new Map();

    const scaleBar = (value, min, max) => {
      if (max === min) return 100;
      return Math.round(5 + ((value - min) / (max - min)) * 95);
    };

    const scoreNote = (value, type) => {
      if (type === 'importance') {
        if (value >= 95) return 'Immediate priority';
        if (value >= 88) return 'High leverage';
        if (value >= 80) return 'Strong candidate';
        return 'Selective use';
      }
      if (value >= 90) return 'Likely unfamiliar';
      if (value >= 82) return 'Ahead of mainstream';
      if (value >= 74) return 'Fresh framing';
      return 'Probably familiar';
    };

    const renderScoreBar = (value, cls, min, max) => {
      const pct = scaleBar(value, min, max);
      return `<div class="score-wrap">
        <span class="score-num">${value}</span>
        <div class="score-bar-bg"><div class="score-bar ${cls}" style="width:${pct}%"></div></div>
      </div>`;
    };

    const preprocess = (ideas) => ideas.map((idea, idx) => ({
      ...idea,
      rank: idx + 1,
      source_count: idea.source_links?.length ?? 0,
      slug: idea.id || slugify(idea.title),
      search_text: [
        idea.title,
        idea.category,
        idea.description,
        idea.why_impactful_for_intequant,
        ...(idea.source_links || []).map((s) => `${s.label} ${s.kind}`),
      ].join(' ').toLowerCase(),
    }));

    const renderBrief = () => {
      const { company_profile: profile, current_challenges: challenges, generated_on, ideas } = data;
      pageSubtitle.textContent = `${profile.name} · ${ideas.length} researched AI ideas · ${challenges.length} synthesized challenges · generated ${generated_on}`;
      companyName.textContent = profile.name;
      companySummary.textContent = profile.summary;
      miniStats.innerHTML = [
        {
          label: 'What They Do',
          value: `${profile.what_they_do.length}`,
          note: 'Public service lines across fundraising, debt, M&A, and transaction support.'
        },
        {
          label: 'Challenges',
          value: `${challenges.length}`,
          note: 'The page is tuned to BD sourcing, investor matching, shared workflows, trust, and confidentiality.'
        },
        {
          label: 'Ideas',
          value: `${ideas.length}`,
          note: 'Sorted by impact and novelty, with public links to the underlying experiments.'
        }
      ].map(stat => `
        <div class="stat-card">
          <div class="stat-label">${stat.label}</div>
          <div class="stat-value">${stat.value}</div>
          <div class="stat-note">${stat.note}</div>
        </div>`).join('');

      challengeList.innerHTML = challenges.map((challenge) => `
        <div class="challenge-card">
          <button type="button" data-challenge="${encodeURIComponent(challenge.title)}">
            <div class="challenge-title">${challenge.title}</div>
            <div class="challenge-body">${challenge.why_it_matters}</div>
          </button>
        </div>`).join('');

      $$('[data-challenge]', challengeList).forEach((btn) => {
        btn.addEventListener('click', () => {
          const title = decodeURIComponent(btn.dataset.challenge || '');
          searchInput.value = title;
          searchQuery = title.trim().toLowerCase();
          renderTable();
        });
      });

      briefGrid.hidden = false;
    };

    const renderFilters = () => {
      const counts = new Map();
      allIdeas.forEach((idea) => counts.set(idea.category, (counts.get(idea.category) || 0) + 1));
      const cats = [...counts.keys()].sort((a, b) => a.localeCompare(b));
      cats.forEach((cat) => categoryToId.set(cat, slugify(cat)));

      categoryFilters.innerHTML = [
        `<button class="chip ${categoryFilter === 'all' ? 'is-active' : ''}" data-filter="all">All ideas <span>${allIdeas.length}</span></button>`,
        ...cats.map((cat) => `<button class="chip ${categoryFilter === cat ? 'is-active' : ''}" data-filter="${cat}">${cat} <span>${counts.get(cat)}</span></button>`)
      ].join('');

      $$('[data-filter]', categoryFilters).forEach((btn) => {
        btn.addEventListener('click', () => {
          categoryFilter = btn.dataset.filter || 'all';
          renderFilters();
          renderTable();
        });
      });
    };

    const compareValues = (a, b, col) => {
      const av = a[col];
      const bv = b[col];
      if (typeof av === 'number' && typeof bv === 'number') return bv - av;
      return String(av).localeCompare(String(bv));
    };

    const getDisplayed = () => {
      const q = searchQuery.trim().toLowerCase();
      const filtered = allIdeas.filter((idea) => {
        const matchesCategory = categoryFilter === 'all' || idea.category === categoryFilter;
        const matchesSearch = !q || idea.search_text.includes(q);
        return matchesCategory && matchesSearch;
      });
      return filtered.sort((a, b) => sortDir * compareValues(a, b, sortCol));
    };

    const renderTable = () => {
      displayedIdeas = getDisplayed();
      const total = allIdeas.length;
      const visible = displayedIdeas.length;
      resultCount.textContent = visible === total && categoryFilter === 'all' && !searchQuery
        ? `${total} ideas ranked for InteQuant Advisors`
        : `${visible} of ${total} ideas${categoryFilter !== 'all' ? ` · ${categoryFilter}` : ''}${searchQuery ? ` · search: “${searchInput.value.trim()}”` : ''}`;

      if (!visible) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No ideas match the current search / filter.</td></tr>`;
        return;
      }

      tbody.innerHTML = displayedIdeas.map((idea, idx) => `
        <tr data-idx="${idx}" data-id="${idea.slug}"${idx === currentIdx && ideaDialog.open ? ' class="is-active"' : ''}>
          <td>${renderScoreBar(idea.importance, 'importance', impMin, impMax)}</td>
          <td>${renderScoreBar(idea.novelty, 'novelty', novMin, novMax)}</td>
          <td><span class="lens-badge">${idea.category}</span></td>
          <td class="col-title">
            <span class="title-text">${idea.title}</span>
            <span class="title-sub">${idea.description}</span>
          </td>
          <td><span class="source-count">${idea.source_count} source${idea.source_count === 1 ? '' : 's'}</span></td>
        </tr>`).join('');

      $$('tbody tr', document).forEach((row) => {
        row.addEventListener('click', () => openAtIdx(Number(row.dataset.idx)));
      });

      $$('th[data-col]').forEach((th) => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (th.dataset.col === sortCol) th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
      });
    };

    const renderDialog = (idea) => {
      const impPct = scaleBar(idea.importance, impMin, impMax);
      const novPct = scaleBar(idea.novelty, novMin, novMax);
      const linksHtml = (idea.source_links || []).length
        ? idea.source_links.map((link) => `
            <a class="explore-link" href="${link.url}" target="_blank" rel="noreferrer">
              <span class="link-label">${link.label}</span>
              <span class="link-kind">${link.kind}</span>
            </a>`).join('')
        : '<p class="tiny-note">No public links attached.</p>';

      return `
        <p class="dialog-overline">${idea.category} · ${idea.id}</p>
        <h2 class="dialog-title">${idea.title}</h2>
        <div class="dialog-scores">
          <div class="score-line">
            <span>Importance</span>
            <strong>${idea.importance}</strong>
            <div class="mini-bar-bg"><div class="mini-bar importance" style="width:${impPct}%"></div></div>
            <span class="score-note">${scoreNote(idea.importance, 'importance')}</span>
          </div>
          <div class="score-line">
            <span>Novelty</span>
            <strong>${idea.novelty}</strong>
            <div class="mini-bar-bg"><div class="mini-bar novelty" style="width:${novPct}%"></div></div>
            <span class="score-note">${scoreNote(idea.novelty, 'novelty')}</span>
          </div>
        </div>
        <p class="dialog-summary">${idea.description}</p>
        <div class="detail-block"><strong>Why it matters for InteQuant:</strong> ${idea.why_impactful_for_intequant}</div>
        <div class="explore-section">
          <h3>Public source trail</h3>
          <div class="explore-links">${linksHtml}</div>
        </div>
      `;
    };

    const updateNav = () => {
      navCounter.textContent = `${currentIdx + 1} / ${displayedIdeas.length}`;
      prevBtn.disabled = currentIdx <= 0;
      nextBtn.disabled = currentIdx >= displayedIdeas.length - 1;
    };

    const openAtIdx = (idx) => {
      currentIdx = idx;
      const idea = displayedIdeas[idx];
      dialogBody.innerHTML = renderDialog(idea);
      updateNav();
      $$('tbody tr').forEach((r) => r.classList.remove('is-active'));
      $(`tbody tr[data-idx="${idx}"]`)?.classList.add('is-active');
      if (!ideaDialog.open) ideaDialog.showModal();
      history.replaceState(null, '', `?idea=${encodeURIComponent(idea.slug)}`);
    };

    const closeDialog = () => {
      ideaDialog.close();
      $$('tbody tr').forEach((r) => r.classList.remove('is-active'));
      history.replaceState(null, '', location.pathname);
    };

    prevBtn.addEventListener('click', () => { if (currentIdx > 0) openAtIdx(currentIdx - 1); });
    nextBtn.addEventListener('click', () => { if (currentIdx < displayedIdeas.length - 1) openAtIdx(currentIdx + 1); });
    $('#dialog-close').addEventListener('click', closeDialog);

    ideaDialog.addEventListener('click', (e) => {
      const rect = ideaDialog.getBoundingClientRect();
      const outside = e.clientY < rect.top || e.clientY > rect.bottom || e.clientX < rect.left || e.clientX > rect.right;
      if (outside) closeDialog();
    });

    document.addEventListener('keydown', (e) => {
      if (!ideaDialog.open) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentIdx > 0) openAtIdx(currentIdx - 1);
      } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentIdx < displayedIdeas.length - 1) openAtIdx(currentIdx + 1);
      }
    });

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      renderTable();
    });

    $$('th.sortable').forEach((th) => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (!col) return;
        if (col === sortCol) sortDir = -sortDir;
        else { sortCol = col; sortDir = -1; }
        renderTable();
      });
    });

    fetch('../ideas.json')
      .then((r) => r.json())
      .then((json) => {
        data = json;
        allIdeas = preprocess(json.ideas || []);
        impMin = Math.min(...allIdeas.map((i) => i.importance));
        impMax = Math.max(...allIdeas.map((i) => i.importance));
        novMin = Math.min(...allIdeas.map((i) => i.novelty));
        novMax = Math.max(...allIdeas.map((i) => i.novelty));

        renderBrief();
        renderFilters();
        renderTable();

        const q = new URLSearchParams(location.search);
        const slug = q.get('idea');
        if (slug) {
          const idx = displayedIdeas.findIndex((idea) => idea.slug === slug || idea.id === slug);
          if (idx >= 0) openAtIdx(idx);
        }
      })
      .catch((err) => {
        console.error(err);
        pageSubtitle.textContent = 'Failed to load ideas.json';
        tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Failed to load ideas. Open the console for details.</td></tr>`;
      });
  </script>
</body>
</html>
