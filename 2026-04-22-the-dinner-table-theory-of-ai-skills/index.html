  <!-- === Marked.js (Markdown renderer) === -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text:    #1a1a1a;
      --muted:   #555;
      --border:  #ddd;
      --accent:  #1a56a0;
      --bg:      #fff;
      --bg-code: #f5f5f5;
      --max-w:   680px;
      --font:    Georgia, 'Times New Roman', serif;
      --mono:    'Courier New', Courier, monospace;
    }

    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.75;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Layout ── */
    .page {
      max-width: var(--max-w);
      margin: 0 auto;
    }

    /* ── Sketchnote ── */
    .sketchnote {
      width: 100%;
      margin: 2.5rem 0;
      text-align: center;
    }
    .sketchnote img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .sketchnote figcaption {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      font-family: system-ui, sans-serif;
    }

    /* ── Markdown typography ── */
    #article h1 { font-size: 1.9rem; line-height: 1.25; margin: 2.5rem 0 0.5rem; }
    #article h2 { font-size: 1.3rem; line-height: 1.3;  margin: 2.5rem 0 0.6rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
    #article h3 { font-size: 1.05rem; margin: 1.8rem 0 0.4rem; }

    #article p  { margin: 1rem 0; }

    #article a  { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    #article a:hover { opacity: 0.75; }

    #article strong { font-weight: 700; }
    #article em     { font-style: italic; }

    #article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    /* Pull quotes */
    #article blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.5rem 0;
      padding: 0.1rem 1.2rem;
      color: var(--muted);
      font-style: italic;
    }
    #article blockquote p { margin: 0.4rem 0; }

    /* Lists */
    #article ul, #article ol {
      margin: 0.8rem 0 0.8rem 1.5rem;
    }
    #article li { margin: 0.3rem 0; }

    /* Code */
    #article code {
      font-family: var(--mono);
      font-size: 0.85rem;
      background: var(--bg-code);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }
    #article pre {
      background: var(--bg-code);
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1.2rem 0;
    }
    #article pre code { background: none; padding: 0; }

    /* First h1 — article title styling */
    #article > h1:first-child {
      font-size: 2.2rem;
      margin-top: 0;
      line-height: 1.2;
    }

    /* Research note at the end */
    #article em:last-child { color: var(--muted); font-size: 0.88rem; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      html { font-size: 16px; }
      #article > h1:first-child { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <main class="page">

    <!-- Sketchnote — place sketchnote.avif in the same folder as this file -->
    <figure class="sketchnote">

           alt="Sketchnote summarising the key ideas from The Dinner Table Theory of AI Skills"
           width="1200" height="800"
           loading="eager">
      <figcaption>Sketchnote — The Dinner Table Theory of AI Skills</figcaption>
    </figure>

    <!-- Rendered article -->
    <article id="article"></article>

  </main>

</script>

    const src = await fetch("README.md").then(r => r.text());
    document.getElementById('article').innerHTML = marked.parse(src);
  </script>
</body>
