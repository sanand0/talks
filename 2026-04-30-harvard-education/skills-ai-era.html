<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skills Growing / Declining in the AI Era</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ══ DARK MODE (default) ══ */
html {
  --bg:          #06080d;
  --surface:     #0d1220;
  --border:      #1c2d48;
  --text:        #f0f4ff;
  --muted:       #7a96b8;
  --dim:         #2c4060;
  --grow:        #00f0a8;
  --shrink:      #ff2f55;
  --zero-clr:    rgba(255,255,255,0.18);
  --track-bg:    rgba(255,255,255,0.05);
  --shadow:      -10px 0 48px rgba(0,0,0,0.55);
  --grow-grad:   linear-gradient(90deg,rgba(0,240,168,0.28),#00f0a8);
  --shrink-grad: linear-gradient(90deg,#ff2f55,rgba(255,47,85,0.28));
  --body-bg:     #020408;
}

/* ══ LIGHT MODE ══ */
html.light {
  --bg:          #f2ede2;
  --surface:     #fdfcf9;
  --border:      #bfccd8;
  --text:        #060912;
  --muted:       #4a5e78;
  --dim:         #8898b0;
  --grow:        #005c3c;
  --shrink:      #be1530;
  --zero-clr:    rgba(0,0,0,0.22);
  --track-bg:    rgba(0,0,0,0.07);
  --shadow:      -8px 0 32px rgba(0,0,0,0.12);
  --grow-grad:   linear-gradient(90deg,rgba(0,92,60,0.22),#005c3c);
  --shrink-grad: linear-gradient(90deg,#be1530,rgba(190,21,48,0.22));
  --body-bg:     #d4ccc0;
}

html,body{
  width:100%;height:100%;
  background:var(--body-bg);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  transition:background 0.3s;
}

/* ══ SLIDE 16:9 ══ */
.slide{
  position:relative;
  background:var(--bg);
  width: min(100vw,177.78vh);
  height:min(100vh,56.25vw);
  display:grid;
  grid-template-rows: auto 1fr auto auto;
  padding:1.8% 3.4% 1.1%;
  gap:0.45%;
  overflow:hidden;
  transition:background 0.3s;
}

/* ══ HEADER ══ */
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:1em;
}
.header-left{flex:1;min-width:0;}

h1{
  font-family:'Fraunces',serif;
  font-size:clamp(1.5rem,2.9vw,3.4rem);
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.025em;
  line-height:1.05;
}
.w-grow  {color:var(--grow);}
.w-slash {color:var(--muted);}
.w-shrink{color:var(--shrink);}

.accent-line{
  height:2px;width:4.2em;
  background:linear-gradient(90deg,var(--grow),var(--shrink));
  border-radius:2px;
  margin-top:0.28em;
}

.subtitle{
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.5rem,0.68vw,0.76rem);
  color:var(--muted);
  margin-top:0.18em;
  font-weight:300;
  letter-spacing:0.01em;
}

/* ══ MODE TOGGLE ══ */
.mode-toggle{
  flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.48rem,0.65vw,0.72rem);
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  padding:0.3em 0.8em;
  border-radius:2px;
  cursor:pointer;
  transition:color 0.15s,border-color 0.15s;
  margin-top:0.15em;
  white-space:nowrap;
}
.mode-toggle:hover{color:var(--text);border-color:var(--muted);}

/* ══ CHART
   label:27%  bar-area:67%  pct:6%
   zero in bar-area: 80/165 = 48.485%
   zero from left:   27 + 67×0.48485 = 27+32.48 = 59.49%
══ */
main{
  display:flex;
  flex-direction:column;
  gap:0.28%;
  position:relative;
  overflow:hidden;
}

main::after{             /* continuous zero-line */
  content:'';
  position:absolute;
  left:59.49%;
  top:0;bottom:0;width:1px;
  background:var(--zero-clr);
  pointer-events:none;
  z-index:3;
}

/* ══ ROWS ══ */
.row{
  flex:1;
  display:flex;
  align-items:center;
  cursor:pointer;
  border-radius:2px;
  transition:background 0.12s;
  border-left:3px solid transparent;
  padding-left:2px;
  min-height:0;
}
.row:hover             {background:rgba(128,160,220,0.07);}
.row:focus             {outline:none;}
.row.active.grow-row   {border-left-color:var(--grow);  background:rgba(0,240,168,0.06);}
.row.active.shrink-row {border-left-color:var(--shrink);background:rgba(255,47,85,0.06);}

.label{
  width:27%;min-width:27%;flex-shrink:0;
  text-align:right;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.68rem,1.08vw,1.18rem);
  font-weight:400;
  color:var(--text);
  line-height:1.2;
  padding-right:1%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.bar-area{flex:1;min-width:0;display:flex;align-items:center;}

.track{
  width:100%;
  height:clamp(8px,1.5vh,18px);
  position:relative;
  background:var(--track-bg);
  border-radius:1px;
}

.bar{position:absolute;height:100%;top:0;border-radius:1px;}
.bar.grow  {background:var(--grow-grad);  animation:revR 0.85s cubic-bezier(0.16,1,0.3,1) both;}
.bar.shrink{background:var(--shrink-grad);animation:revL 0.85s cubic-bezier(0.16,1,0.3,1) both;}
.row:hover .bar,.row.active .bar{filter:brightness(1.14) saturate(1.1);}

@keyframes revR{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
@keyframes revL{from{clip-path:inset(0 0 0 100%)}to{clip-path:inset(0 0 0 0)}}

.pct{
  width:6%;min-width:6%;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.62rem,0.95vw,1.05rem);
  font-weight:500;
  padding-left:0.55%;
  white-space:nowrap;
}
.pct.grow  {color:var(--grow);}
.pct.shrink{color:var(--shrink);}

/* ══ AXIS TICKS ══ */
.axis-row{
  position:relative;
  margin-left:27%;
  width:67%;
  height:clamp(0.7em,1.1vh,0.9em);
}
.tick{
  position:absolute;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.36rem,0.53vw,0.6rem);
  color:var(--dim);
  transform:translateX(-50%);
  white-space:nowrap;
}

/* ══ FOOTER ══ */
footer{
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.32rem,0.47vw,0.54rem);
  color:var(--dim);
  font-weight:300;
  letter-spacing:0.02em;
  border-top:1px solid var(--border);
  padding-top:0.45%;
}

/* ══ POPUP — no overlay, chart stays visible ══ */
.popup{
  position:absolute;
  top:16%;right:0;
  width:28%;
  max-height:74%;
  overflow-y:auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-right:none;
  border-radius:4px 0 0 4px;
  padding:clamp(0.75rem,1.3vw,1.35rem);
  z-index:20;
  display:none;
  box-shadow:var(--shadow);
  transition:background 0.3s,border-color 0.3s;
}
.popup.show{display:block;animation:slideIn 0.22s cubic-bezier(0.16,1,0.3,1);}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

.popup-accent{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  border-radius:4px 0 0 4px;
}

.popup-top{
  display:flex;align-items:center;
  justify-content:space-between;
  margin-bottom:0.65em;gap:0.4em;
}
.popup-nav{display:flex;align-items:center;gap:0.35em;}

.nav-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.52rem,0.72vw,0.8rem);
  padding:0.15em 0.55em;
  border-radius:2px;line-height:1.5;
  transition:color 0.12s,border-color 0.12s;
}
.nav-btn:hover:not(:disabled){color:var(--text);border-color:var(--muted);}
.nav-btn:disabled{opacity:0.22;cursor:default;}

.popup-counter{
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.44rem,0.6vw,0.66rem);
  color:var(--muted);
  white-space:nowrap;min-width:3em;text-align:center;
}

.close-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.5rem,0.68vw,0.76rem);
  padding:0.15em 0.55em;
  border-radius:2px;
  transition:color 0.12s,border-color 0.12s;flex-shrink:0;
}
.close-btn:hover{color:var(--text);border-color:var(--muted);}

.popup-skill{
  font-family:'Fraunces',serif;
  font-size:clamp(0.9rem,1.38vw,1.52rem);
  font-weight:600;color:var(--text);
  line-height:1.18;margin-bottom:0.2em;
}

.popup-pct{
  font-family:'Fraunces',serif;
  font-size:clamp(1.8rem,3.2vw,3.8rem);
  font-weight:700;letter-spacing:-0.04em;
  line-height:1;margin-bottom:0.4em;
}
.popup-pct.grow  {color:var(--grow);}
.popup-pct.shrink{color:var(--shrink);}

.popup-divider{height:1px;background:var(--border);margin-bottom:0.6em;}

.popup-reason{
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.56rem,0.84vw,0.92rem);
  color:var(--text);
  line-height:1.75;font-weight:300;
}

.popup-hint{
  font-family:'IBM Plex Mono',monospace;
  font-size:clamp(0.36rem,0.48vw,0.54rem);
  color:var(--dim);
  margin-top:0.9em;letter-spacing:0.03em;
}
</style>
</head>
<body>
<div class="slide">

  <div class="header-row">
    <div class="header-left">
      <h1>Skills
        <span class="w-grow">Growing</span>
        <span class="w-slash"> / </span>
        <span class="w-shrink">Declining</span>
        <span style="color:var(--text)"> in the AI Era</span>
      </h1>
      <div class="accent-line"></div>
      <p class="subtitle">Curriculum-priority shift index &nbsp;·&nbsp; click any bar for the rationale</p>
    </div>
    <button class="mode-toggle" id="modeToggle">☀ Light</button>
  </div>

  <main id="chart"></main>

  <div class="axis-row" id="axisRow"></div>

  <footer>
    WEF Future of Jobs 2025 &nbsp;·&nbsp;
    Microsoft Work Trend Index 2025 &nbsp;·&nbsp;
    UNESCO AI Competency Framework for Teachers &nbsp;·&nbsp;
    OpenAI GPT Labour Market Study 2023
  </footer>

  <div class="popup" id="popup" role="dialog" aria-label="Skill detail">
    <div class="popup-accent" id="popupAccent"></div>
    <div class="popup-top">
      <div class="popup-nav">
        <button class="nav-btn" id="navUp"   aria-label="Previous skill (↑)" disabled>↑</button>
        <span   class="popup-counter" id="popupCounter">1 / 14</span>
        <button class="nav-btn" id="navDown" aria-label="Next skill (↓)">↓</button>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="Close (Esc)">✕</button>
    </div>
    <div class="popup-skill"  id="pSkill"></div>
    <div class="popup-pct"    id="pPct"></div>
    <div class="popup-divider"></div>
    <div class="popup-reason" id="pReason"></div>
    <div class="popup-hint">↑ ↓ &nbsp;navigate &nbsp;·&nbsp; Esc &nbsp;close</div>
  </div>

</div>
<script>
const skills = [
  { skill:"Critical Evaluation & Judgment",       change:+85, reason:"AI produces fluent, plausible output at scale. The bottleneck shifts entirely to human judgment about what's true, good, or worth acting on. Bloom's highest level — evaluate and create — becomes the only level that matters, and the one most curricula currently spend the least time on." },
  { skill:"AI Orchestration & Delegation",        change:+78, reason:"Students must learn to direct models, tools, and agents as a coordinated system — not merely 'use AI.' This is the new management layer: delegating, prompting with context, refining outputs, knowing when to push back. WEF and Microsoft both flag this as the defining workforce competency shift of the coming decade." },
  { skill:"Ethical Reasoning & Governance",       change:+68, reason:"AI executes — fast and at scale — whatever humans decide to do. The cost of poor values just multiplied enormously. UNESCO, WEF, and employer surveys all converge: this is no longer aspirational. The question is no longer what can we do, but what should we — and who is responsible when it goes wrong." },
  { skill:"Problem Framing & Decomposition",      change:+62, reason:"Execution is now cheap. The scarce skill is upstream: defining which problem is worth solving, and breaking it into tasks precise enough for AI to execute reliably. Educators recognise this as problem-solving — the emphasis shifts decisively from solution to specification." },
  { skill:"Aesthetic Judgment & Creative Direction", change:+50, reason:"When execution is nearly free, taste becomes the differentiator. Recognising quality, defining a distinctive voice, and steering AI toward it is hard to commoditise. Educators call this creative thinking — but demand shifts from generating to curating and directing. Most curricula have no language for this yet." },
  { skill:"Questioning & Context Engineering",    change:+46, reason:"What you feed AI — examples, constraints, personas, what to include or omit — now determines output quality more than technical skill. Curiosity and the ability to ask well-structured, generative questions become core academic competencies, not nice-to-haves. A brand-new entrant to the curriculum conversation." },
  { skill:"Metacognition: Learning How to Learn", change:+40, reason:"What needs to be known shifts every 12–18 months. Students who can rapidly acquire enough of a new domain to supervise AI in it will outrun those who can't. Knowing how you learn is the meta-skill for an era of permanent curriculum disruption." },
  { skill:"Communication & Persuasion",           change:+28, reason:"AI can draft; humans still shape meaning, audience fit, narrative, and trust. Face-to-face influence, negotiation, and public speaking remain the hardest skills to fake in high-stakes contexts — and most valuable for exactly that reason. The skill remains but shifts from production to direction." },
  { skill:"Collaboration & Interpersonal Skills", change:+15, reason:"AI weakens the premium on solo production but raises the value of aligning humans around messy goals and trade-offs. The skill evolves: students must now coordinate humans and AI agents together, and judge which situations to automate and which to keep human." },
  { skill:"Domain Conceptual Foundations",        change: +5, reason:"Domain knowledge survives — but the profile flips entirely. Recall and coverage matter far less; judgment survives. Knowing what's plausible, what's missing, and when the machine is confidently wrong requires enough conceptual grounding to catch errors — not enough to replace retrieval." },
  { skill:"Writing & Coding First Drafts",        change:-18, reason:"The blank-page problem — long the hardest part of writing and coding — is effectively solved. Curriculum hours spent on producing first drafts are increasingly misallocated. What grows instead: editing, challenging, and directing an AI-generated baseline." },
  { skill:"Academic Research & Synthesis",        change:-42, reason:"Finding, evaluating, and summarising sources — the bulk of what research-skills courses teach — is AI's strongest suit. Residual value lies in knowing what question to ask and what to trust, not in the mechanics of search, reading, and synthesis." },
  { skill:"Factual Recall & Memorisation",        change:-65, reason:"The oldest implicit skill of schooling — and the clearest casualty. AI outperforms any human on recall by orders of magnitude, instantly. The only residual case: building enough intuition for rapid judgment in device-free, time-constrained situations — a narrow and shrinking use case." },
  { skill:"Tool Operation & Procedural Syntax",   change:-80, reason:"Knowing exact menu paths, formula syntax, or CLI commands matters far less as AI can operate those tools directly. What survives is conceptual intent — knowing what outcome you want — not mechanical execution. WEF and Microsoft both confirm this as the fastest-declining skill category across every industry." },
];

const MIN_V=-80, RANGE=165;
const ZERO=(80/RANGE)*100; // 48.485% in bar-area

/* ── THEME ── */
const html=document.documentElement;
const toggle=document.getElementById('modeToggle');
const mq=window.matchMedia('(prefers-color-scheme: dark)');

setTheme(!mq.matches);
mq.addEventListener('change', e=>{ if(!html.dataset.manual) setTheme(!e.matches); });
toggle.addEventListener('click',()=>{ html.dataset.manual='1'; setTheme(!html.classList.contains('light')); });

function setTheme(isLight){
  html.classList.toggle('light',isLight);
  toggle.textContent=isLight?'🌙 Dark':'☀ Light';
}

/* ── BUILD ROWS ── */
const chart=document.getElementById('chart');
skills.forEach((d,i)=>{
  const isGrow=d.change>=0;
  const barPct=(Math.abs(d.change)/RANGE)*100;

  const row=document.createElement('div');
  row.className=`row ${isGrow?'grow-row':'shrink-row'}`;
  row.tabIndex=0;
  row.dataset.idx=i;
  row.setAttribute('role','button');

  const label=document.createElement('div');
  label.className='label';
  label.textContent=d.skill;
  label.title=d.skill;

  const barArea=document.createElement('div');
  barArea.className='bar-area';
  const track=document.createElement('div');
  track.className='track';
  const bar=document.createElement('div');
  bar.className=`bar ${isGrow?'grow':'shrink'}`;
  bar.style.animationDelay=`${i*0.042}s`;
  if(isGrow){ bar.style.left=`${ZERO}%`; bar.style.width=`${barPct}%`; }
  else      { bar.style.left=`${ZERO-barPct}%`; bar.style.width=`${barPct}%`; }
  track.appendChild(bar); barArea.appendChild(track);

  const pctEl=document.createElement('div');
  pctEl.className=`pct ${isGrow?'grow':'shrink'}`;
  pctEl.textContent=(d.change>0?'+':'')+d.change+'%';

  row.appendChild(label); row.appendChild(barArea); row.appendChild(pctEl);
  chart.appendChild(row);

  row.addEventListener('click',()=>openPopup(i));
  row.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openPopup(i);}});
});

/* ── AXIS TICKS ── */
const axisRow=document.getElementById('axisRow');
[-80,-40,0,40,80].forEach(t=>{
  const pct=((t-MIN_V)/RANGE)*100;
  const span=document.createElement('span');
  span.className='tick';
  span.style.left=pct+'%';
  span.textContent=t===0?'0':(t>0?'+'+t+'%':t+'%');
  axisRow.appendChild(span);
});

/* ── POPUP ── */
const popup    =document.getElementById('popup');
const accent   =document.getElementById('popupAccent');
const pSkill   =document.getElementById('pSkill');
const pPct     =document.getElementById('pPct');
const pReason  =document.getElementById('pReason');
const counter  =document.getElementById('popupCounter');
const navUp    =document.getElementById('navUp');
const navDown  =document.getElementById('navDown');
const closeBtn =document.getElementById('closeBtn');
let   currentIdx=-1;

function openPopup(idx){
  const d=skills[idx]; currentIdx=idx;
  const isGrow=d.change>=0;
  pSkill.textContent=d.skill;
  pPct.textContent=(d.change>0?'+':'')+d.change+'%';
  pPct.className='popup-pct '+(isGrow?'grow':'shrink');
  pReason.textContent=d.reason;
  counter.textContent=`${idx+1} / ${skills.length}`;
  accent.style.background=isGrow?'var(--grow)':'var(--shrink)';
  navUp.disabled  =idx===0;
  navDown.disabled=idx===skills.length-1;
  document.querySelectorAll('.row').forEach((r,i)=>r.classList.toggle('active',i===idx));
  popup.classList.add('show');
}

function closePopup(){
  currentIdx=-1;
  popup.classList.remove('show');
  document.querySelectorAll('.row').forEach(r=>r.classList.remove('active'));
}

navUp.addEventListener('click',  ()=>{ if(currentIdx>0)                    openPopup(currentIdx-1); });
navDown.addEventListener('click', ()=>{ if(currentIdx<skills.length-1)      openPopup(currentIdx+1); });
closeBtn.addEventListener('click', closePopup);

document.addEventListener('keydown',e=>{
  if(!popup.classList.contains('show')) return;
  if(e.key==='ArrowUp')  { e.preventDefault(); if(currentIdx>0)               openPopup(currentIdx-1); }
  if(e.key==='ArrowDown'){ e.preventDefault(); if(currentIdx<skills.length-1) openPopup(currentIdx+1); }
  if(e.key==='Escape')   closePopup();
});
</script>
</body>
</html>
