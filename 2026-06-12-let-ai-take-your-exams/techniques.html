<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Let AI Take Your Exams — Technique Atlas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='12'%20fill='%23101218'/%3E%3Ccircle%20cx='18'%20cy='44'%20r='5'%20fill='%23FF6B6B'/%3E%3Ccircle%20cx='34'%20cy='30'%20r='5'%20fill='%231ABC9C'/%3E%3Ccircle%20cx='46'%20cy='18'%20r='5'%20fill='%233DA5FF'/%3E%3Ccircle%20cx='44'%20cy='46'%20r='5'%20fill='%23FF6FB5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
:root{
  /* technique categories */
  --c-solve:#FF6B6B; --c-study:#3DA5FF; --c-verify:#2ECC71;
  /* setting badges */
  --s-endorsed:#2ECC71; --s-open:#3DA5FF; --s-demo:#F7934C; --s-exploit:#FF5C8A;
}
[data-theme="dark"]{
  --bg:#0f1014; --bg2:#15171e; --panel:#191c25; --panel2:#21242f;
  --ink:#eef0f6; --ink2:#aeb3c2; --ink3:#727789; --line:#2c3040; --line2:#3a3f52;
  --accent:#ff5252; --shadow:0 18px 50px -12px rgba(0,0,0,.7);
  --grid:rgba(255,255,255,.045); --quad:rgba(255,255,255,.035); --quad-line:rgba(255,255,255,.07);
  --label-bg:rgba(20,22,30,.72); --tip-bg:rgba(22,25,34,.97);
}
[data-theme="light"]{
  --bg:#f6f2e9; --bg2:#efe9db; --panel:#fffdf8; --panel2:#f3eee2;
  --ink:#1b1a17; --ink2:#52504a; --ink3:#8a877e; --line:#e0d9c8; --line2:#cfc6b1;
  --accent:#d6322a; --shadow:0 18px 50px -16px rgba(60,50,30,.35);
  --grid:rgba(0,0,0,.05); --quad:rgba(0,0,0,.028); --quad-line:rgba(0,0,0,.07);
  --label-bg:rgba(255,253,248,.82); --tip-bg:rgba(255,253,248,.98);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:"Space Grotesk",system-ui,sans-serif;
  background:
    radial-gradient(1100px 600px at 88% -8%, color-mix(in srgb,var(--accent) 11%, transparent), transparent 60%),
    radial-gradient(900px 500px at -5% 108%, color-mix(in srgb,var(--c-study) 11%, transparent), transparent 60%),
    var(--bg);
  color:var(--ink);
  display:flex;flex-direction:column;height:100dvh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ---------- Header ---------- */
header{
  display:flex;align-items:center;gap:14px;padding:12px clamp(12px,3vw,26px);
  border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--bg2) 70%,transparent);
  backdrop-filter:blur(8px);z-index:20;flex:none;
}
.brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand h1{
  font-family:"Fraunces",serif;font-weight:600;margin:0;
  font-size:clamp(15px,2.3vw,23px);letter-spacing:-.01em;line-height:1.12;
}
.brand h1 em{font-style:italic;color:var(--accent);white-space:nowrap}
.spacer{flex:1}
.hbtns{display:flex;gap:8px;align-items:center}
.iconbtn{
  display:grid;place-items:center;width:38px;height:38px;border-radius:11px;
  border:1px solid var(--line2);background:var(--panel);color:var(--ink2);transition:.18s;
}
.iconbtn:hover{color:var(--ink);border-color:var(--accent);transform:translateY(-1px)}
.iconbtn svg{width:18px;height:18px}
#clearBtn,#tourBtn{width:auto;padding:0 14px;gap:7px;font-size:13px;font-weight:600}
#clearBtn{display:none}
#clearBtn.on{display:flex}
#tourBtn{border-color:color-mix(in srgb,var(--accent) 55%,transparent);color:var(--ink);display:flex;}
#tourBtn:hover{background:color-mix(in srgb,var(--accent) 14%,transparent)}
@media(max-width:520px){#clearBtn span,#tourBtn span{display:none}#clearBtn,#tourBtn{padding:0;width:38px}}
.count{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums;white-space:nowrap}
@media(max-width:640px){.brand .sub{display:none}.count{display:none}}

/* ---------- Legend / workflow ---------- */
.legend{
  flex:none;display:flex;align-items:stretch;gap:0;overflow-x:auto;overflow-y:hidden;
  padding:10px clamp(10px,3vw,26px);border-bottom:1px solid var(--line);
  scrollbar-width:thin;background:color-mix(in srgb,var(--bg2) 40%,transparent);
}
.legend::-webkit-scrollbar{height:6px}
.legend::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
.lstep{display:flex;align-items:center;flex:none}
.lchip{
  --col:var(--ink3);
  display:flex;align-items:center;gap:7px;padding:6px 12px 6px 9px;border-radius:999px;
  border:1.5px solid transparent;background:var(--panel);transition:.16s;white-space:nowrap;
  position:relative;
}
.lchip .dot{width:11px;height:11px;border-radius:50%;background:var(--col);box-shadow:0 0 0 3px color-mix(in srgb,var(--col) 22%,transparent);flex:none}
.lchip .nm{font-size:12.5px;font-weight:600;color:var(--ink2);letter-spacing:.01em}
.lchip:hover{border-color:var(--col);transform:translateY(-1px)}
.lchip:hover .nm{color:var(--ink)}
.lchip.active{background:color-mix(in srgb,var(--col) 16%,var(--panel));border-color:var(--col)}
.lchip.active .nm{color:var(--ink)}
.lchip.dim{opacity:.4}
.larrow{width:18px;height:2px;flex:none;position:relative;background:var(--line2);margin:0 2px}
.larrow::after{content:"";position:absolute;right:-1px;top:-2px;border-left:5px solid var(--line2);border-top:3px solid transparent;border-bottom:3px solid transparent}
.lcap{font-size:11px;color:var(--ink3);margin-right:10px;align-self:center;font-style:italic;white-space:nowrap}
.lsep{width:1px;height:24px;flex:none;align-self:center;background:var(--line2);margin:0 12px}
@media(max-width:760px){.lcap{display:none}}

/* ---------- Plot ---------- */
#plotwrap{flex:1;position:relative;min-height:0;overflow:hidden}
#plot{width:100%;height:100%;display:block;touch-action:none}
.quad-label{
  font-family:"Fraunces",serif;font-weight:600;fill:var(--ink);
  opacity:.06;pointer-events:none;text-transform:uppercase;letter-spacing:.06em;
}
[data-theme="light"] .quad-label{opacity:.07}
.quad-line{stroke:var(--quad-line);stroke-width:1;stroke-dasharray:2 6}
.gridline{stroke:var(--grid);stroke-width:1}
.axis-cap{font-size:11.5px;font-weight:600;fill:var(--ink3);letter-spacing:.08em;text-transform:uppercase}
.axis-arrow{stroke:var(--ink3);stroke-width:1.5;fill:none;opacity:.5;marker-end:url(#arrowhead)}
.pt{cursor:pointer;transition:opacity .25s, r .15s, stroke-width .15s}
.pt circle{stroke:var(--bg);stroke-width:1.5}
[data-theme="light"] .pt circle{stroke:#fff}
.pt.faded{opacity:.13}
.pt.hot circle{stroke:var(--ink);stroke-width:2.5}
.pt:focus{outline:none}
.pt:focus circle{stroke:var(--ink);stroke-width:2.5}
.plabel{
  font-size:11px;font-weight:500;fill:var(--ink);paint-order:stroke;
  pointer-events:none;transition:opacity .25s;
}
.plabel .bg{fill:var(--label-bg)}
.pleader{stroke:var(--ink3);stroke-width:1;opacity:.35;pointer-events:none}
.brushlayer .selection{fill:color-mix(in srgb,var(--accent) 12%,transparent);stroke:var(--accent);stroke-width:1.5;stroke-dasharray:4 3;rx:6}
.brushlayer .handle{fill:var(--accent)}

/* ---------- Tooltip ---------- */
#tip{
  position:fixed;z-index:60;max-width:280px;pointer-events:none;opacity:0;
  transform:translateY(4px);transition:opacity .12s;background:var(--tip-bg);
  border:1px solid var(--line2);border-radius:12px;padding:11px 13px;box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
#tip.show{opacity:1;transform:none}
#tip .t-stage{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
#tip .t-name{font-family:"Fraunces",serif;font-weight:600;font-size:15px;margin:3px 0 2px;line-height:1.2}
#tip .t-tag{font-size:12.5px;color:var(--ink2);line-height:1.35}
#tip .t-why{font-size:12px;color:var(--ink2);line-height:1.4;margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
#tip .t-why b{color:var(--ink3);font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}

/* ---------- Brush popup ---------- */
#brushpop{
  position:fixed;z-index:55;right:clamp(10px,2vw,22px);bottom:clamp(10px,2vw,22px);
  width:min(360px,calc(100vw - 24px));max-height:min(58vh,520px);display:none;flex-direction:column;
  background:var(--panel);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);
  overflow:hidden;animation:rise .22s ease both;
}
#brushpop.show{display:flex}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.bp-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line)}
.bp-head h3{margin:0;font-family:"Fraunces",serif;font-size:15px;font-weight:600}
.bp-head .c{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px}
.bp-list{overflow-y:auto;padding:6px}
.bp-row{display:flex;gap:10px;align-items:flex-start;padding:9px 10px;border-radius:10px;cursor:pointer;transition:.13s}
.bp-row:hover{background:var(--panel2)}
.bp-row .bar{width:4px;align-self:stretch;border-radius:2px;flex:none}
.bp-row .nm{font-weight:600;font-size:13.5px;line-height:1.2}
.bp-row .tg{font-size:11.5px;color:var(--ink3);line-height:1.3;margin-top:2px}
.bp-row .st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.bp-row .why{font-size:11.5px;color:var(--ink2);line-height:1.4;margin-top:5px;font-style:italic}
.bp-empty{padding:20px;text-align:center;color:var(--ink3);font-size:13px}

/* ---------- Sidebar ---------- */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:70;opacity:0;pointer-events:none;transition:.25s}
#scrim.show{opacity:1;pointer-events:auto}
#side{
  position:fixed;top:0;right:0;height:100dvh;width:min(480px,100vw);z-index:80;
  background:var(--panel);border-left:1px solid var(--line2);box-shadow:var(--shadow);
  transform:translateX(102%);transition:transform .32s cubic-bezier(.4,0,.15,1);
  display:flex;flex-direction:column;
}
#side.show{transform:none}
.side-head{padding:20px clamp(18px,4vw,26px) 16px;border-bottom:1px solid var(--line);position:relative}
.side-head .stagebadge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:4px 11px;border-radius:999px}
.side-head h2{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(21px,3.6vw,27px);line-height:1.12;margin:12px 0 6px}
.side-head .tag{font-size:14.5px;color:var(--ink2);line-height:1.4;font-style:italic}
.side-close{position:absolute;top:16px;right:16px}
.side-body{overflow-y:auto;padding:18px clamp(18px,4vw,26px) 40px;flex:1;min-height:0;scrollbar-width:thin}
.side-body::-webkit-scrollbar{width:8px}
.side-body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px}
.chip{font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px;border:1px solid var(--line2);color:var(--ink2);background:var(--panel2)}
.setting{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 11px;border-radius:999px;margin-left:8px;vertical-align:middle}
.setting .sdot{width:8px;height:8px;border-radius:50%;background:currentColor}
#tip .t-setting{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:1px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.sec{margin-top:22px}
.sec h4{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin:0 0 9px;display:flex;align-items:center;gap:8px}
.sec h4::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.move-list{margin:0;padding:0;list-style:none;counter-reset:m}
.move-list li{counter-increment:m;position:relative;padding:9px 12px 9px 40px;margin-bottom:7px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;font-size:13.5px;line-height:1.45;font-family:"JetBrains Mono",monospace}
.move-list li::before{content:counter(m);position:absolute;left:10px;top:9px;width:20px;height:20px;border-radius:6px;background:var(--accent);color:#fff;font-family:"Space Grotesk";font-weight:700;font-size:11px;display:grid;place-items:center}
.callout{font-size:14px;line-height:1.55;color:var(--ink);padding:12px 14px;border-radius:10px;border-left:3px solid var(--accent);background:var(--bg2)}
.callout.warn{border-left-color:var(--s-demo)}
.callout.learn{border-left-color:var(--c-study)}
.ex{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:11px;background:var(--bg2)}
.ex p{margin:0 0 11px;font-size:13.5px;line-height:1.5;color:var(--ink2)}
.ex a{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--accent);text-decoration:none;padding:6px 12px;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:9px;transition:.15s;word-break:break-all}
.ex a:hover{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.ex a svg{width:14px;height:14px;flex:none}
.ex .ftype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);margin-bottom:7px}

/* ---------- Tour ---------- */
.pt.tourhot circle{stroke:var(--accent);stroke-width:3;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{r:9}50%{r:12}}
.tour-foot{flex:none;border-top:1px solid var(--line2);background:var(--panel2);padding:12px clamp(14px,4vw,22px) max(12px,env(safe-area-inset-bottom))}
.tour-prog{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin-bottom:11px}
.tour-prog .bar{height:100%;background:var(--accent);border-radius:3px;transition:width .35s cubic-bezier(.4,0,.15,1)}
.tour-meta{display:flex;align-items:center;justify-content:center;gap:8px;font-size:11.5px;color:var(--ink3);margin-bottom:10px;text-align:center}
.tour-meta b{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.tour-meta .stg{font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tour-btns{display:flex;gap:10px}
.tour-btns button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;height:46px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid var(--line2);background:var(--panel);color:var(--ink);transition:.15s}
.tour-btns button:hover:not(:disabled){border-color:var(--accent);transform:translateY(-1px)}
.tour-btns button:disabled{opacity:.4;cursor:default}
.tour-btns .next{background:var(--accent);color:#fff;border-color:var(--accent)}
.tour-btns .next:hover{filter:brightness(1.08)}
.tour-btns svg{width:17px;height:17px}
.tour-kbd{text-align:center;font-size:10.5px;color:var(--ink3);margin-top:8px}
.tour-kbd kbd{font-family:"JetBrains Mono",monospace;background:var(--bg2);border:1px solid var(--line2);border-radius:4px;padding:0 5px;font-size:10px}
#tourBtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
#loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--ink3);font-size:14px;z-index:5}
.hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);font-size:11.5px;color:var(--ink3);background:color-mix(in srgb,var(--panel) 80%,transparent);padding:5px 13px;border-radius:999px;border:1px solid var(--line);pointer-events:none;opacity:.85;white-space:nowrap}
@media(max-width:560px){.hint{display:none}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Let AI Take Your Exams <em>— Technique Atlas</em></h1>
  </div>
  <div class="spacer"></div>
  <div class="hbtns">
    <span class="count" id="count"></span>
    <button id="tourBtn" class="iconbtn" title="Take the guided tour">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v16M5 4h11l-2 3 2 3H5"/></svg>
      <span>Tour</span>
    </button>
    <button id="clearBtn" class="iconbtn" title="Show all stages">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
      <span>Show all</span>
    </button>
    <button id="themeBtn" class="iconbtn" title="Toggle theme" aria-label="Toggle theme"></button>
  </div>
</header>

<nav class="legend" id="legend" aria-label="Technique categories"></nav>

<div id="plotwrap">
  <svg id="plot" role="img" aria-label="Scatter plot of techniques by impact and ease"></svg>
  <div id="loading">Loading techniques…</div>
  <div class="hint">Hover a point for details · drag to brush a region · click for the full card</div>
</div>

<div id="tip" role="tooltip"></div>

<aside id="brushpop" aria-label="Selected techniques">
  <div class="bp-head">
    <h3>In selection</h3><span class="c" id="bpCount">0</span>
    <div class="spacer" style="flex:1"></div>
    <button class="iconbtn" id="bpClose" style="width:30px;height:30px" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="bp-list" id="bpList"></div>
</aside>

<div id="scrim"></div>
<aside id="side" aria-label="Technique details" tabindex="-1"></aside>

<script>
// ---------------------------------------------------------------- config
// key (matches "category" in the data), display label, color var, caption
const CATEGORIES = [
  ["solve","Solve","--c-solve","let AI take the exam"],
  ["study","Study","--c-study","let AI teach you"],
  ["verify","Verify","--c-verify","judge what AI can't do"],
];
const CAT_IDX = new Map(CATEGORIES.map((c,i)=>[c[0],i]));
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const catColor = k => css(CATEGORIES[CAT_IDX.get(k)][2]);
const catLabel = k => CAT_IDX.has(k) ? CATEGORIES[CAT_IDX.get(k)][1] : k;

// "setting" tag: label + color var
const SETTINGS = {
  "endorsed":     ["Endorsed","--s-endorsed"],
  "open-book-ok": ["Open-book OK","--s-open"],
  "demo-only":    ["Demo only","--s-demo"],
  "exploit-known":["Known exploit","--s-exploit"],
};
const SETTING_ORDER = ["endorsed","open-book-ok","demo-only","exploit-known"];
const settingLabel = s => SETTINGS[s] ? SETTINGS[s][0] : s;
const settingColor = s => SETTINGS[s] ? css(SETTINGS[s][1]) : css('--ink3');

const ICON = {
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>',
  close:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
  arrowL:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  arrowR:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
};

// guided tour: highest-leverage techniques, in narrative order Solve → Study → Verify
const TOUR = [
  'browser-agent-full-exam','checker-first-solving','devtools-page-is-a-program', // Solve
  'learn-by-solving','wrong-answer-postmortem','ai-as-socratic-coach',            // Study
  'provenance-ladder','build-a-verify-button','anti-exam-design',                 // Verify
  'collaborate-and-disclose',
];

// ---------------------------------------------------------------- state
const state = { sel:new Set(), selS:new Set(), tech:null, brush:null, theme:null, tour:null };

function parseURL(){
  const h = location.hash.replace(/^#\??/,'');
  const p = new URLSearchParams(h);
  state.sel = new Set((p.get('sel')||'').split(',').filter(s=>CAT_IDX.has(s)));
  state.selS = new Set((p.get('set')||'').split(',').filter(s=>SETTINGS[s]));
  state.tech = p.get('tech')||null;
  const b = (p.get('brush')||'').split(',').map(Number);
  state.brush = (b.length===4 && b.every(n=>!isNaN(n))) ? b : null;
  state.theme = p.get('theme')==='light'?'light':(p.get('theme')==='dark'?'dark':null);
  const t = p.get('tour');
  state.tour = (t!=null && +t>=0 && +t<TOUR.length) ? +t : null;
}
function writeURL(){
  const p = new URLSearchParams();
  if(state.sel.size) p.set('sel',[...state.sel].join(','));
  if(state.selS.size) p.set('set',[...state.selS].join(','));
  if(state.tour!=null) p.set('tour',state.tour);
  else if(state.tech) p.set('tech',state.tech);
  if(state.brush) p.set('brush',state.brush.map(n=>+n.toFixed(4)).join(','));
  if(state.theme) p.set('theme',state.theme);
  const s = p.toString();
  history.replaceState(null,'', s ? '#?'+s : location.pathname);
}

// ---------------------------------------------------------------- theme
function applyTheme(){
  const t = state.theme || (matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
  document.documentElement.dataset.theme = t;
  document.getElementById('themeBtn').innerHTML = t==='dark'?ICON.sun:ICON.moon;
}
document.getElementById('themeBtn').onclick = ()=>{
  const cur = document.documentElement.dataset.theme;
  state.theme = cur==='dark'?'light':'dark';
  applyTheme(); writeURL(); render(); buildLegend();
};

// ---------------------------------------------------------------- github links
function ghLink(path){
  const m = path.match(/^~\/code\/([^/]+)\/(.*)$/);
  if(!m) return null;
  const repo = m[1]; let rest = m[2];
  const isDir = rest==='' || rest.endsWith('/');
  if(isDir) rest = rest.replace(/\/$/,'');
  return `https://github.com/sanand0/${repo}/${isDir?'tree':'blob'}/main/${rest}`;
}
function isFileLink(link){ return !/^https?:\/\//i.test(link); }
function linkHref(ex){ return isFileLink(ex.link) ? (ghLink(ex.link)||ex.link) : ex.link; }
function linkLabel(ex){
  if(!isFileLink(ex.link)){ try{return new URL(ex.link).hostname.replace(/^www\./,'');}catch{return ex.link;} }
  return ex.link.replace(/^~\/code\//,'').replace(/^~\//,'');
}

// ---------------------------------------------------------------- data + layout
let DATA=[];
const svg = d3.select('#plot');
let W=0,H=0, sx,sy;
const PAD=0.028;

function computePositions(){
  const n = DATA.length;
  [...DATA].sort((a,b)=> a.impact-b.impact || a.ease-b.ease)
    .forEach((r,i)=> r._y = PAD + (1-2*PAD)*(i+0.5)/n);
  [...DATA].sort((a,b)=> a.ease-b.ease || b.impact-a.impact)
    .forEach((r,i)=> r._x = PAD + (1-2*PAD)*(i+0.5)/n);
}

// measure text width
const mctx = document.createElement('canvas').getContext('2d');
function textW(t,font){ mctx.font=font; return mctx.measureText(t).width; }

// ---------------------------------------------------------------- render
function isHot(d){
  return (state.sel.size===0 || state.sel.has(d.category)) &&
         (state.selS.size===0 || state.selS.has(d.setting));
}

function applyPointState(){
  const tourId = state.tour!=null ? TOUR[state.tour] : null;
  d3.selectAll('g.pt')
    .classed('faded',d=> tourId ? d.id!==tourId : !isHot(d))
    .classed('tourhot',d=> tourId ? d.id===tourId : false)
    .select('circle').attr('r',d=> (tourId&&d.id===tourId)?9:(isHot(d)?7:6));
}

function render(){
  const wrap = document.getElementById('plotwrap');
  W = wrap.clientWidth; H = wrap.clientHeight;
  if(W<2||H<2) return;
  svg.attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const ml = Math.max(34, W*0.045), mr = Math.max(18,W*0.03), mt = 16, mb = 30;
  const pw = W-ml-mr, ph = H-mt-mb;
  sx = d3.scaleLinear([0,1],[ml, ml+pw]);
  sy = d3.scaleLinear([0,1],[mt+ph, mt]);
  const cx = sx(0.5), cy = sy(0.5);

  const defs = svg.append('defs');
  defs.append('marker').attr('id','arrowhead').attr('viewBox','0 0 10 10')
    .attr('refX',8).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto-start-reverse')
    .append('path').attr('d','M0 1 L9 5 L0 9').attr('fill','none').attr('stroke',css('--ink3')).attr('stroke-width',1.5);

  // gridlines
  const g = svg.append('g');
  d3.range(0.1,1,0.1).forEach(t=>{
    g.append('line').attr('class','gridline').attr('x1',sx(t)).attr('x2',sx(t)).attr('y1',mt).attr('y2',mt+ph);
    g.append('line').attr('class','gridline').attr('x1',ml).attr('x2',ml+pw).attr('y1',sy(t)).attr('y2',sy(t));
  });

  // quadrant labels + divider
  const qg = svg.append('g');
  qg.append('line').attr('class','quad-line').attr('x1',cx).attr('x2',cx).attr('y1',mt).attr('y2',mt+ph);
  qg.append('line').attr('class','quad-line').attr('x1',ml).attr('x2',ml+pw).attr('y1',cy).attr('y2',cy);
  const qfs = Math.min(pw,ph)*0.11;
  const quads = [
    ["Moonshots", sx(0.25), sy(0.75)],
    ["Quick Wins", sx(0.75), sy(0.75)],
    ["Time Sinks", sx(0.25), sy(0.25)],
    ["Small Wins", sx(0.75), sy(0.25)],
  ];
  quads.forEach(([t,x,y])=>{
    qg.append('text').attr('class','quad-label').attr('x',x).attr('y',y)
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('font-size',Math.max(20,Math.min(64,qfs))).text(t);
  });

  // axis captions with arrows
  const ag = svg.append('g');
  ag.append('text').attr('class','axis-cap').attr('x',ml+pw).attr('y',H-9).attr('text-anchor','end').text('Easier →');
  ag.append('text').attr('class','axis-cap').attr('x',13).attr('y',mt+12).text('↑ Impact');

  // brush layer (below points so empty space brushes)
  const brushG = svg.append('g').attr('class','brushlayer');
  const brush = d3.brush()
    .extent([[ml,mt],[ml+pw,mt+ph]])
    .on('end', brushed);
  brushG.call(brush);

  // points
  const ptsG = svg.append('g').style('pointer-events','none');
  const sel = ptsG.selectAll('g.pt').data(DATA,d=>d.id).join('g')
    .attr('class','pt').attr('transform',d=>`translate(${sx(d._x)},${sy(d._y)})`)
    .attr('tabindex',0).attr('role','button').attr('aria-label',d=>d.name)
    .style('pointer-events','all');
  sel.append('circle').attr('r',6).attr('fill',d=>catColor(d.category));
  applyPointState();
  sel.on('pointerenter',(e,d)=>showTip(e,d))
     .on('pointermove',moveTip)
     .on('pointerleave',hideTip)
     .on('click',(e,d)=>{ e.stopPropagation(); openSide(d.id); })
     .on('keydown',(e,d)=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();openSide(d.id);} });

  // labels (greedy, collision-free) — only for hot points
  layoutLabels(svg, ml,mt,pw,ph);

  // restore brush
  if(state.brush){
    const [x0,y0,x1,y1]=state.brush;
    brushG.call(brush.move,[[sx(x0),sy(y1)],[sx(x1),sy(y0)]]);
  }
  brushGRef = brushG; brushRef = brush;

  document.getElementById('loading').style.display='none';
  updateCount();
}

let brushGRef=null, brushRef=null;

function layoutLabels(svg, ml,mt,pw,ph){
  const font = '500 11px "Space Grotesk", sans-serif';
  const placed=[]; // {x,y,w,h}
  const lg = svg.append('g');
  const r=7, gap=5, padX=4, padY=2.5, lh=15;
  // priority: hot points first, then higher impact
  const order = DATA.filter(isHot).sort((a,b)=> b.impact-a.impact || b.ease-a.ease);
  const overlap=(a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  for(const d of order){
    const cx=sx(d._x), cy=sy(d._y);
    const tw=textW(d.name,font), w=tw+padX*2, h=lh;
    const cands=[
      [cx+r+gap, cy-h/2, 'start', cx+r+gap, cy],
      [cx-r-gap-w, cy-h/2, 'start', cx-r-gap, cy],
      [cx-w/2, cy-r-gap-h, 'middle', cx, cy-r-gap],
      [cx-w/2, cy+r+gap, 'middle', cx, cy+r+gap],
      [cx+r+gap*.6, cy-r-gap-h, 'start', cx+r*.7, cy-r*.7],
      [cx-r-gap*.6-w, cy-r-gap-h, 'start', cx-r*.7, cy-r*.7],
      [cx+r+gap*.6, cy+r+gap*.4, 'start', cx+r*.7, cy+r*.7],
      [cx-r-gap*.6-w, cy+r+gap*.4, 'start', cx-r*.7, cy+r*.7],
    ];
    let chosen=null;
    for(const [bx,by] of cands){
      const box={x:bx-padX, y:by, w:w, h:h};
      if(box.x<ml||box.x+box.w>ml+pw||box.y<mt||box.y+box.h>mt+ph) continue;
      if(placed.some(p=>overlap(box,p))) continue;
      chosen={bx,by,box}; break;
    }
    if(!chosen) continue;
    placed.push(chosen.box);
    const {bx,by,box}=chosen;
    // leader line
    lg.append('line').attr('class','pleader')
      .attr('x1',cx).attr('y1',cy)
      .attr('x2',Math.max(box.x,Math.min(cx,box.x+box.w)))
      .attr('y2',Math.max(box.y,Math.min(cy,box.y+box.h)));
    const tg=lg.append('g').attr('class','plabel');
    tg.append('rect').attr('class','bg').attr('x',box.x).attr('y',box.y-1)
      .attr('width',box.w).attr('height',box.h+2).attr('rx',4);
    tg.append('text').attr('x',bx).attr('y',by+11)
      .attr('font-size',11).attr('font-weight',500)
      .text(d.name).attr('fill',css('--ink'));
  }
}

// ---------------------------------------------------------------- tooltip
const tip = document.getElementById('tip');
function showTip(e,d){
  const col=catColor(d.category), scol=settingColor(d.setting);
  tip.innerHTML = `<div class="t-stage" style="color:${col}">${catLabel(d.category)}`+
    `<span class="t-setting" style="color:${scol};background:${hexA(scol,.16)}">${settingLabel(d.setting)}</span></div>`+
    `<div class="t-name">${esc(d.name)}</div><div class="t-tag">${esc(d.tagline)}</div>`+
    (d.why?`<div class="t-why"><b>Why it works</b>${esc(d.why)}</div>`:'');
  tip.classList.add('show'); moveTip(e);
  d3.select(e.currentTarget).classed('hot',true).select('circle').attr('r',9);
}
function moveTip(e){
  const r=tip.getBoundingClientRect();
  let x=e.clientX+16, y=e.clientY+16;
  if(x+r.width>innerWidth-8) x=e.clientX-r.width-16;
  if(y+r.height>innerHeight-8) y=e.clientY-r.height-16;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hideTip(e){
  tip.classList.remove('show');
  d3.select(e.currentTarget).classed('hot',false).select('circle').attr('r',isHot(d3.select(e.currentTarget).datum())?7:6);
}

// ---------------------------------------------------------------- brushing
function brushed(e){
  if(!e.selection){ if(state.brush){state.brush=null; writeURL(); closeBrushPop();} return; }
  if(!e.sourceEvent) return; // programmatic restore
  const [[x0,y0],[x1,y1]]=e.selection;
  state.brush=[sx.invert(x0), sy.invert(y1), sx.invert(x1), sy.invert(y0)];
  writeURL(); openBrushPop();
}
function selectedByBrush(){
  if(!state.brush) return [];
  const [x0,y0,x1,y1]=state.brush;
  return DATA.filter(d=> d._x>=x0&&d._x<=x1&&d._y>=y0&&d._y<=y1)
    .sort((a,b)=> b.impact-a.impact);
}
function openBrushPop(){
  const items=selectedByBrush();
  const pop=document.getElementById('brushpop');
  document.getElementById('bpCount').textContent=items.length;
  const list=document.getElementById('bpList');
  if(!items.length){ list.innerHTML='<div class="bp-empty">No techniques in this region.</div>'; }
  else list.innerHTML=items.map(d=>{
    const col=catColor(d.category);
    return `<div class="bp-row" data-id="${d.id}"><div class="bar" style="background:${col}"></div>`+
      `<div><div class="nm">${esc(d.name)}</div><div class="tg">${esc(d.tagline)}</div>`+
      `<div class="st" style="color:${col}">${catLabel(d.category)} · ${esc(settingLabel(d.setting))}</div>`+
      (d.why?`<div class="why">${esc(d.why)}</div>`:'')+`</div></div>`;
  }).join('');
  list.querySelectorAll('.bp-row').forEach(el=> el.onclick=()=>openSide(el.dataset.id));
  pop.classList.add('show');
}
function closeBrushPop(){ document.getElementById('brushpop').classList.remove('show'); }
document.getElementById('bpClose').onclick=()=>{
  closeBrushPop();
  if(brushGRef&&brushRef) brushGRef.call(brushRef.move,null);
  state.brush=null; writeURL();
};

// ---------------------------------------------------------------- sidebar
function openSide(id, keepTour){
  const d=DATA.find(x=>x.id===id); if(!d) return;
  if(!keepTour && state.tour!=null){ state.tour=null; document.getElementById('tourBtn').classList.remove('on'); applyPointState(); }
  state.tech=id; writeURL();
  const col=catColor(d.category), scol=settingColor(d.setting);
  const steps=(d.steps||[]).map(m=>`<li>${esc(m)}</li>`).join('');
  const tools=(d.tools||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('');
  const ex=(d.examples||[]).map(e=>{
    const href=linkHref(e), lab=linkLabel(e), file=isFileLink(e.link);
    return `<div class="ex"><div class="ftype">${file?'Source file':'Reference'}</div>`+
      `<p>${esc(e.context)}</p><a href="${href}" target="_blank" rel="noopener">${ICON.ext}<span>${esc(lab)}</span></a></div>`;
  }).join('');
  document.getElementById('side').innerHTML=`
    <div class="side-head">
      <button class="iconbtn side-close" id="sideClose" aria-label="Close">${ICON.close}</button>
      <span class="stagebadge" style="background:${hexA(col,.16)};color:${col}"><span style="width:9px;height:9px;border-radius:50%;background:${col};display:inline-block"></span>${catLabel(d.category)}</span>
      <span class="setting" style="background:${hexA(scol,.16)};color:${scol}"><span class="sdot"></span>${esc(settingLabel(d.setting))}</span>
      <h2>${esc(d.name)}</h2>
      <div class="tag">${esc(d.tagline)}</div>
      <div class="chips">${tools}</div>
    </div>
    <div class="side-body">
      <div class="sec"><h4>The steps</h4><ol class="move-list">${steps}</ol></div>
      ${d.why?`<div class="sec"><h4>Why it works</h4><div class="callout">${esc(d.why)}</div></div>`:''}
      ${d.learn_instead?`<div class="sec"><h4>Learn this instead</h4><div class="callout learn">${esc(d.learn_instead)}</div></div>`:''}
      ${d.watch_for?`<div class="sec"><h4>Watch for</h4><div class="callout warn">${esc(d.watch_for)}</div></div>`:''}
      ${ex?`<div class="sec"><h4>From the corpus</h4>${ex}</div>`:''}
    </div>`;
  document.getElementById('sideClose').onclick=closeSide;
  if(state.tour!=null) buildTourFooter();
  document.getElementById('side').classList.add('show');
  document.getElementById('scrim').classList.add('show');
  document.getElementById('side').focus();
}
function closeSide(){
  const wasTour = state.tour!=null;
  state.tour=null; state.tech=null;
  document.getElementById('tourBtn').classList.remove('on');
  writeURL();
  document.getElementById('side').classList.remove('show');
  document.getElementById('scrim').classList.remove('show');
  if(wasTour) applyPointState();
}
document.getElementById('scrim').onclick=closeSide;

// ---------------------------------------------------------------- tour
function startTour(i){
  state.tour=i; state.brush=null; closeBrushPop();
  document.getElementById('tourBtn').classList.add('on');
  applyPointState();
  openSide(TOUR[i], true);
}
function gotoTour(i){
  if(i<0) return;
  if(i>=TOUR.length){ closeSide(); return; }
  state.tour=i; applyPointState();
  openSide(TOUR[i], true);
  const sb=document.querySelector('.side-body'); if(sb) sb.scrollTop=0;
}
function buildTourFooter(){
  const i=state.tour, n=TOUR.length;
  const d=DATA.find(x=>x.id===TOUR[i]); if(!d) return;
  const col=catColor(d.category), pct=Math.round(((i+1)/n)*100);
  const foot=document.createElement('div');
  foot.className='tour-foot';
  foot.innerHTML=
    `<div class="tour-prog"><div class="bar" style="width:${pct}%"></div></div>`+
    `<div class="tour-meta">Stop <b>${i+1}</b>&nbsp;/&nbsp;<b>${n}</b> · <span class="stg" style="color:${col}">${catLabel(d.category)}</span></div>`+
    `<div class="tour-btns">`+
      `<button class="prev" ${i===0?'disabled':''}>${ICON.arrowL}<span>Prev</span></button>`+
      `<button class="next">${i===n-1?'<span>Finish</span>'+ICON.check:'<span>Next</span>'+ICON.arrowR}</button>`+
    `</div>`+
    `<div class="tour-kbd">Use <kbd>←</kbd> <kbd>→</kbd> to move · <kbd>Esc</kbd> to exit</div>`;
  document.getElementById('side').appendChild(foot);
  foot.querySelector('.prev').onclick=()=>gotoTour(i-1);
  foot.querySelector('.next').onclick=()=>gotoTour(i+1);
}
document.getElementById('tourBtn').onclick=()=>{
  if(state.tour!=null) closeSide(); else startTour(0);
};

// ---------------------------------------------------------------- legend
function buildLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  // category filters, with arrows tracing the Solve -> Study -> Verify arc
  CATEGORIES.forEach(([key,label,varname,cap],i)=>{
    const step=document.createElement('div'); step.className='lstep';
    step.appendChild(makeChip('cat',key,label,css(varname),cap));
    if(i<CATEGORIES.length-1){ const a=document.createElement('div'); a.className='larrow'; step.appendChild(a); }
    leg.appendChild(step);
  });
  // divider, then setting filters
  const sep=document.createElement('div'); sep.className='lsep'; leg.appendChild(sep);
  SETTING_ORDER.forEach(key=>{
    const [label,varname]=SETTINGS[key];
    const step=document.createElement('div'); step.className='lstep';
    step.appendChild(makeChip('set',key,label,css(varname),label));
    leg.appendChild(step);
  });
  syncLegend();
}
function makeChip(dim,key,label,col,cap){
  const sel = dim==='cat' ? state.sel : state.selS;
  const chip=document.createElement('button');
  chip.className='lchip'; chip.dataset.dim=dim; chip.dataset.key=key;
  chip.style.setProperty('--col',col);
  chip.innerHTML=`<span class="dot"></span><span class="nm">${label}</span>`;
  chip.title=`${label} - ${cap}`;
  chip.onclick=()=>{ sel.has(key)?sel.delete(key):sel.add(key); applySel(); };
  chip.onpointerenter=()=>previewSel(dim,key);
  chip.onpointerleave=()=>previewSel(null,null);
  return chip;
}
function syncLegend(){
  document.querySelectorAll('.lchip').forEach(c=>{
    const sel = c.dataset.dim==='cat' ? state.sel : state.selS;
    const key=c.dataset.key;
    c.classList.toggle('active',sel.has(key));
    c.classList.toggle('dim',sel.size>0 && !sel.has(key));
  });
  document.getElementById('clearBtn').classList.toggle('on',state.sel.size>0||state.selS.size>0);
}
function previewSel(dim,key){
  d3.selectAll('g.pt').classed('faded',d=>{
    if(!key) return !isHot(d);
    const hot = dim==='cat' ? d.category===key : d.setting===key;
    return !hot;
  });
}
function applySel(){
  writeURL(); syncLegend();
  applyPointState();
  // re-layout labels for the new highlighted set
  svg.selectAll('.plabel,.pleader').remove();
  const ml=Math.max(34,W*0.045), mr=Math.max(18,W*0.03);
  layoutLabels(svg, ml,16, W-ml-mr, H-16-30);
  updateCount();
  if(state.brush) openBrushPop();
}
document.getElementById('clearBtn').onclick=()=>{ state.sel.clear(); state.selS.clear(); applySel(); };

function updateCount(){
  const c=document.getElementById('count');
  const active = state.sel.size || state.selS.size;
  c.textContent = active ? `${DATA.filter(isHot).length} of ${DATA.length} shown` : `${DATA.length} techniques`;
}

// ---------------------------------------------------------------- utils
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function hexA(hex,a){
  const m=hex.replace('#','');
  const r=parseInt(m.slice(0,2),16),g=parseInt(m.slice(2,4),16),b=parseInt(m.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ---------------------------------------------------------------- boot
document.addEventListener('keydown',e=>{
  if(state.tour!=null && (e.key==='ArrowRight'||e.key==='ArrowLeft')){
    e.preventDefault();
    gotoTour(state.tour + (e.key==='ArrowRight'?1:-1));
    return;
  }
  if(e.key==='Escape'){
    if(document.getElementById('side').classList.contains('show')) closeSide();
    else if(document.getElementById('brushpop').classList.contains('show')){
      closeBrushPop(); if(brushGRef&&brushRef) brushGRef.call(brushRef.move,null); state.brush=null; writeURL();
    }
  }
});
let rt;
addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>render(),160); });

async function boot(){
  parseURL(); applyTheme(); buildLegend();
  try{
    const res=await fetch('techniques.jsonl');
    const txt=await res.text();
    DATA=txt.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
  }catch(err){
    document.getElementById('loading').textContent='Could not load techniques.jsonl — serve this folder over HTTP.';
    return;
  }
  computePositions();
  render();
  if(state.tour!=null) startTour(state.tour);
  else if(state.tech) openSide(state.tech);
  if(state.brush && state.tour==null) openBrushPop();
}
boot();
</script>
</body>
