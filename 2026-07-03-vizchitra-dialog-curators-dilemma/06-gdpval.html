<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GDPVal</title>
<style>
:root {
  --page-width: 420mm;
  --page-height: 297mm;
  --page-padding: 0;
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #fff; }
body {
  font-family: Avenir Next, Optima, Candara, Segoe UI, sans-serif;
  color: #111827;
}
@page { size: var(--page-width) var(--page-height); margin: 0; }
.page {
  width: var(--page-width);
  height: var(--page-height);
  overflow: hidden;
  background: #fff;
  display: flex;
  flex-direction: column;
  padding: var(--page-padding, 0);
}
.fit {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fit > svg,
.fit > img,
.fit > .fragment {
  width: 100% !important;
  height: 100% !important;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
svg { overflow: visible; }
.title {
  font-size: 28pt;
  line-height: 1.05;
  margin: 0 0 8mm;
  font-weight: 700;
}
.description {
  font-size: 13pt;
  line-height: 1.35;
  margin: -4mm 0 7mm;
  color: #374151;
  max-width: 330mm;
}
@media screen {
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
      linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  }
  .page { box-shadow: 0 12px 40px rgb(0 0 0 / 0.22); }
}
@media print {
  body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .page { box-shadow: none; }
}


body { background: #fff; }

</style>
</head>
<body>
<main class="page">
<section class="fit"><img src="assets/06-gdpval.png" alt="GDPVal full page" style="width: 100%; height: 100%; object-fit: contain;"></section>
</main>
</body>
</html>
