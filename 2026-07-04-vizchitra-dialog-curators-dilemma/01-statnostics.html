<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Statnostics</title>
<style>
:root {
  --page-width: 297mm;
  --page-height: 420mm;
  --page-padding: 0;
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #fff; }
body {
  font-family: Avenir Next, Optima, Candara, Segoe UI, sans-serif;
  color: #111827;
}
@page { size: var(--page-width) var(--page-height); margin: 0; }
.page {
  width: var(--page-width);
  height: var(--page-height);
  overflow: hidden;
  background: #fff;
  display: flex;
  flex-direction: column;
  padding: var(--page-padding, 0);
}
.fit {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fit > svg,
.fit > img,
.fit > .fragment {
  width: 100% !important;
  height: 100% !important;
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
svg { overflow: visible; }
.title {
  font-size: 28pt;
  line-height: 1.05;
  margin: 0 0 8mm;
  font-weight: 700;
}
.description {
  font-size: 13pt;
  line-height: 1.35;
  margin: -4mm 0 7mm;
  color: #374151;
  max-width: 330mm;
}
@media screen {
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
      linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0;
  }
  .page { box-shadow: 0 12px 40px rgb(0 0 0 / 0.22); }
}
@media print {
  body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .page { box-shadow: none; }
}


.statnostics-page > svg {
  width: 100% !important;
  height: auto !important;
  max-height: 100% !important;
}

</style>
</head>
<body>
<main class="page">
<section class="fit statnostics-page"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
<defs>
<style>
.mast-bg  { fill: #ed1c24; }
.wm-wh    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#ffffff; }
.wm-dk    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#231f20; }
.tagline  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:15px; fill:#ffffff; }
.border   { fill:none; stroke:#231f20; stroke-width:0.8; }
.sep      { stroke:#231f20; stroke-width:0.6; fill:none; }
.hl       { font-family: PoynterOSDisplay-Bold,'Poynter OS Display',Georgia,'Times New Roman',serif; font-size:24px; font-weight:bold; fill:#231f20; }
.deck     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:13px; fill:#231f20; }
.note     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10.5px; fill:#6b7280; }
.source   { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:9.4px; fill:#9ca3af; }
.grid-lbl { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:9px; fill:#9ca3af; }
.x-lbl    { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10px; fill:#374151; text-anchor:middle; }
.end-lbl  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10px; }
.val-lbl  { font-family: GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif; font-size:13px; font-weight:bold; }
.leg-lbl  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10px; fill:#374151; }
</style>
</defs>

<!-- Background -->
<rect width="480" height="480" fill="#ffffff"/>

<!-- Masthead -->
<rect class="mast-bg" width="480" height="29"/>
<text transform="translate(6 21) scale(1 1.11)" class="wm-wh">STA<tspan class="wm-dk">TOI</tspan>STICS</text>
<text transform="translate(128 22) scale(1 1.11)" class="tagline">A slice of life in numbers</text>

<!-- Border -->
<rect class="border" x="0.4" y="0.4" width="479.2" height="479.2"/>

<!-- Headline -->
<text x="240" y="67" text-anchor="middle" class="hl">Study more, wait longer:</text>
<text x="240" y="96" text-anchor="middle" class="hl">India’s education-jobs paradox</text>

<!-- Deck -->
<text x="240" y="119" text-anchor="middle" class="deck">Among 25–34 year olds, the best-educated are 7× more likely to be</text>
<text x="240" y="136" text-anchor="middle" class="deck">looking for work than the least-educated — and the gap keeps widening.</text>

<!-- Separator -->
<line class="sep" x1="30" y1="149" x2="450" y2="149"/>

<!-- === CHART AREA x: 100–395, y: 175–375 === -->

<!-- Grid lines (horizontal) at 0%, 5%, 10%, 15%, 20%, 25% -->
<line x1="97" y1="375" x2="420" y2="375" stroke="#e5e7eb" stroke-width="0.6"/>
<line x1="97" y1="335" x2="420" y2="335" stroke="#e5e7eb" stroke-width="0.6"/>
<line x1="97" y1="295" x2="420" y2="295" stroke="#e5e7eb" stroke-width="0.6"/>
<line x1="97" y1="255" x2="420" y2="255" stroke="#e5e7eb" stroke-width="0.6"/>
<line x1="97" y1="215" x2="420" y2="215" stroke="#e5e7eb" stroke-width="0.6"/>
<line x1="97" y1="175" x2="420" y2="175" stroke="#e5e7eb" stroke-width="0.6"/>

<!-- Y-axis labels -->
<text x="92" y="378" text-anchor="end" class="grid-lbl">0%</text>
<text x="92" y="338" text-anchor="end" class="grid-lbl">5%</text>
<text x="92" y="298" text-anchor="end" class="grid-lbl">10%</text>
<text x="92" y="258" text-anchor="end" class="grid-lbl">15%</text>
<text x="92" y="218" text-anchor="end" class="grid-lbl">20%</text>
<text x="92" y="178" text-anchor="end" class="grid-lbl">25%</text>

<!-- Y axis label -->
<text transform="translate(30 290) rotate(-90)" text-anchor="middle" class="grid-lbl">share of 25–34 respondents</text>

<!-- === SALARIED LINE (blue) ===
     Points: 100,339 | 185,331 | 285,278.2 | 395,211.8 -->
<polyline points="100,339.0 185,331.0 285,278.2 395,211.8" fill="none" stroke="#1d3461" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

<!-- Salaried dots -->
<circle cx="100" cy="339.0" r="5" fill="#1d3461" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="185" cy="331.0" r="5" fill="#1d3461" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="285" cy="278.2" r="5" fill="#1d3461" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="395" cy="211.8" r="5" fill="#1d3461" stroke="#ffffff" stroke-width="1.5"/>

<!-- Salaried value labels (above dots) -->
<text x="100" y="330.5" text-anchor="middle" class="val-lbl" fill="#1d3461">4.5%</text>
<text x="185" y="322.5" text-anchor="middle" class="val-lbl" fill="#1d3461">5.5%</text>
<text x="285" y="269.7" text-anchor="middle" class="val-lbl" fill="#1d3461">12.1%</text>
<text x="395" y="203.3" text-anchor="middle" class="val-lbl" fill="#1d3461">20.4%</text>

<!-- === WAITING LINE (crimson/red) ===
     Points: 100,363.8 | 185,360.6 | 285,345.4 | 395,292.6 -->
<polyline points="100,363.8 185,360.6 285,345.4 395,292.6" fill="none" stroke="#c1121f" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="5,3"/>

<!-- Waiting dots -->
<circle cx="100" cy="363.8" r="5" fill="#c1121f" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="185" cy="360.6" r="5" fill="#c1121f" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="285" cy="345.4" r="5" fill="#c1121f" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="395" cy="292.6" r="5" fill="#c1121f" stroke="#ffffff" stroke-width="1.5"/>

<!-- Waiting value labels (below dots) -->
<text x="105" y="377.5" text-anchor="middle" class="val-lbl" fill="#c1121f">1.4%</text>
<text x="185" y="373.5" text-anchor="middle" class="val-lbl" fill="#c1121f">1.8%</text>
<text x="285" y="359.2" text-anchor="middle" class="val-lbl" fill="#c1121f">3.7%</text>
<!-- Waiting HS+ label - move up to avoid overlap with x-labels -->
<text x="395" y="286.0" text-anchor="middle" class="val-lbl" fill="#c1121f">10.3%</text>

<!-- X-axis labels (education groups) -->
<text x="100" y="393" class="x-lbl">Primary</text>
<text x="185" y="393" class="x-lbl">Middle</text>
<text x="285" y="393" class="x-lbl">Secondary</text>
<text x="395" y="393" class="x-lbl">Higher-</text>
<text x="395" y="404" class="x-lbl">Secondary+</text>

<!-- Arrow: the gap at Higher-Secondary+ end (between two lines) -->
<!-- Line segment + arrow heads showing the gap is wider -->
<line x1="435" y1="211.8" x2="435" y2="292.6" stroke="#6b7280" stroke-width="0.9"/>
<polygon points="435,211.8 432,219 438,219" fill="#6b7280"/>
<polygon points="435,292.6 432,285.6 438,285.6" fill="#6b7280"/>
<text x="447" y="252" text-anchor="middle" class="grid-lbl" style="fill:#6b7280;">10.2</text>
<text x="448" y="261" text-anchor="middle" class="grid-lbl" style="fill:#6b7280;">pp gap</text>

<!-- Arrow at Primary end (tiny gap for reference) -->
<line x1="56" y1="339.0" x2="56" y2="363.8" stroke="#6b7280" stroke-width="0.9"/>
<polygon points="56,339.0 53,347 59,347" fill="#6b7280"/>
<polygon points="56,363.8 53,356.8 59,356.8" fill="#6b7280"/>
<text x="46" y="351.4" text-anchor="middle" class="grid-lbl" style="fill:#6b7280;">3.1</text>
<text x="46" y="360.4" text-anchor="middle" class="grid-lbl" style="fill:#6b7280;">pp</text>

<!-- Legend -->
<rect x="140" y="159" width="10" height="10" rx="2" fill="#1d3461"/>
<text x="153" y="167" class="leg-lbl" fill="#1d3461">In salaried job</text>
<line x1="338" y1="163" x2="356" y2="163" stroke="#c1121f" stroke-width="2" stroke-dasharray="4,2.5"/>
<circle cx="347" cy="163" r="4" fill="#c1121f" stroke="#fff" stroke-width="1.2"/>
<text x="361" y="167" class="leg-lbl" fill="#c1121f">Waiting for work</text>

<!-- Annotation box: the paradox -->
<rect x="99" y="158" width="38" height="12" rx="2" fill="#f0f4ff" stroke="#1d3461" stroke-width="0.5"/>
<text x="118" y="167" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:8px;fill:#1d3461;">gap: 3.1pp</text>

<rect x="296" y="158" width="38" height="12" rx="2" fill="#fff0f0" stroke="#c1121f" stroke-width="0.5"/>
<text x="316" y="167" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:8px;fill:#c1121f;">gap: 10.2pp</text>

<!-- Footer separator -->
<line class="sep" x1="30" y1="415" x2="450" y2="415"/>

<!-- Note -->
<text x="240" y="429" text-anchor="middle" class="note">‘Available for work’ = respondents not working but actively seeking employment.</text>
<text x="240" y="442" text-anchor="middle" class="note">Higher-Secondary+ includes graduates and post-graduates | 25–34 age band | n=14,459.</text>

<!-- Source -->
<text x="240" y="457" text-anchor="middle" class="source">Source: Citizen Survey 2022–23 (Lancet Citizens’ Commission on Reimagining India’s Health System)</text>
</svg></section>
</main>
</body>
</html>
